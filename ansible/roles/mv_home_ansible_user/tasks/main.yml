---

# Role: mv_home_ansible_user
# mv /home/{{ ansible_user }} to /home.local/{{ ansible_user }}
#
# This role is internally called from nfs_server and nfs_client rols

- name: make sure /home.local exists
  file:
    path: /home.local
    state: directory

- name: check /home/{{ ansible_user }} exists
  stat:
    path: /home/{{ ansible_user }}
  register: home_ansible_user_stat

- name: copy /home/{{ ansible_user }} to /home.local/{{ ansible_user }}
  copy:
    src: /home/{{ ansible_user }}
    dest: /home.local/
    remote_src: yes
    mode: preserve
    directory_mode: yes
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
  when: home_ansible_user_stat.stat.exists

- name: change {{ ansible_user }}'s homedir to /home.local/{{ ansible_user }}
  lineinfile:
    path: /etc/passwd
    regexp: '^{{ ansible_user }}:x:1000:1000:{{ ansible_user_group }}:/home/{{ ansible_user }}:/bin/bash'
    line: '{{ ansible_user }}:x:1000:1000:{{ ansible_user_group }}:/home.local/{{ ansible_user }}:/bin/bash'

- name: remove /home/{{ ansible_user }}
  file:
    path: /home/{{ ansible_user }}
    state: absent

